<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Gambar Blogger</title>
    <style>
        body{font-family:Arial;max-width:500px;margin:20px auto;padding:15px}
        input,button{width:100%;padding:12px;margin:8px 0;font-size:16px}
        button{background:#ff6f00;color:white;border:none;border-radius:5px}
        .status{padding:10px;margin:10px 0;border-radius:5px;display:none}
        .success{background:#d4edda;color:#155724}
        .error{background:#f8d7da;color:#721c24}
        #result a{color:#1a73e8;word-break:break-all}
    </style>
</head>
<body>
    <h2>📤 Upload Gambar Blogger</h2>
    
    <input type="email" id="bloggerEmail" value="mfdstore-private@blogger.com" readonly style="background:#f0f0f0">
    <input type="email" id="smtpEmail" placeholder="Gmail Anda (contoh: pfareezonzz01@gmail.com)" required>
    <input type="password" id="smtpPassword" placeholder="App Password Gmail (16 digit)" required>
    <input type="file" id="imageFile" accept="image/*" required>
    
    <button onclick="upload()" id="btn">🚀 Upload</button>
    <div class="status" id="status"></div>
    <div class="status" id="result"></div>

    <script>
        async function upload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            const formData = new FormData();
            formData.append('bloggerEmail', document.getElementById('bloggerEmail').value);
            formData.append('smtpEmail', document.getElementById('smtpEmail').value);
            formData.append('smtpPassword', document.getElementById('smtpPassword').value);
            formData.append('image', document.getElementById('imageFile').files[0]);

            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            status.style.display = 'block';
            status.className = 'status';
            status.textContent = '📧 Menghantar...';

            try {
                const res = await fetch('upload.php', { method: 'POST', body: formData });
                const json = await res.json();
                
                if (json.success) {
                    status.className = 'status success';
                    status.textContent = '✅ Berjaya!';
                    result.style.display = 'block';
                    result.innerHTML = '🔗 <a href="' + json.image_url + '" target="_blank">' + json.image_url + '</a><br><button onclick="navigator.clipboard.writeText(\'' + json.image_url + '\')">📋 Copy</button>';
                } else {
                    throw new Error(json.message);
                }
            } catch (e) {
                status.className = 'status error';
                status.textContent = '❌ ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Upload';
            }
        }
    </script>
</body>
</html>
