<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 Upload Gambar ke Blogger</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 550px; 
            margin: 40px auto; 
            padding: 25px; 
            background: #f5f7fa; 
            color: #333;
        }
        h2 { 
            text-align: center; 
            color: #1a73e8; 
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0; 
            padding-bottom: 15px;
        }
        .form-group { margin: 15px 0; }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            color: #555;
        }
        input[type="email"], 
        input[type="password"], 
        input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { 
            border-color: #1a73e8; 
            outline: none; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1a73e8; 
            color: white; 
            border: none;             border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #1557b0; }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .status { 
            padding: 12px 15px; 
            margin: 15px 0; 
            border-radius: 8px; 
            display: none; 
            font-size: 14px;
            line-height: 1.4;
        }
        .status.info { background: #e3f2fd; color: #0d47a1; border-left: 4px solid #1a73e8; }
        .status.success { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #4caf50; }
        .status.error { background: #ffebee; color: #b71c1c; border-left: 4px solid #f44336; }
        #result { 
            background: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #eee;
            word-break: break-all;
        }
        #result a { 
            color: #1a73e8; 
            text-decoration: none; 
            font-weight: 500;
        }
        #result a:hover { text-decoration: underline; }
        #result button { 
            width: auto; 
            padding: 8px 16px; 
            margin-top: 10px; 
            background: #34a853; 
            font-size: 14px;
        }
        #result button:hover { background: #2d9249; }
        .hint { 
            font-size: 12px; 
            color: #666; 
            margin-top: 4px;
            font-style: italic;
        }        footer { 
            text-align: center; 
            margin-top: 30px; 
            color: #888; 
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h2>📤 Upload Gambar ke Blogger</h2>
    
    <div class="form-group">
        <label for="bloggerEmail">📧 Email Blogger</label>
        <input type="email" id="bloggerEmail" placeholder="pfareezonzz01@blogger.com" required>
        <div class="hint">Format: mfdstore-private@blogger.com (dari Settings → Email to post)</div>
    </div>
    
    <div class="form-group">
        <label for="smtpEmail">🔐 Gmail untuk SMTP</label>
        <input type="email" id="smtpEmail" placeholder="pfareezonzz01@gmail.com" required>
        <div class="hint">Akaun Gmail yang sama dengan Blogger</div>
    </div>
    
    <div class="form-group">
        <label for="smtpPassword">🔑 App Password</label>
        <input type="password" id="smtpPassword" placeholder="abcd efgh ijkl nmop" required>
        <div class="hint">16-digit dari Google Security → App passwords</div>
    </div>
    
    <div class="form-group">
        <label for="imageFile">🖼️ Pilih Gambar</label>
        <input type="file" id="imageFile" accept="image/*" required>
        <div class="hint">Format: JPG, PNG, GIF (max 10MB)</div>
    </div>
    
    <button onclick="upload()" id="btn">🚀 Upload Sekarang</button>
    
    <div class="status" id="status"></div>
    <div class="status" id="result"></div>
    
    <footer>
        🔒 Data diproses secara selamat • Token tidak disimpan • <a href="#" onclick="clearForm()">Reset</a>
    </footer>

    <script>
        // 🔧 Clear form untuk keselamatan
        function clearForm() {
            document.getElementById('bloggerEmail').value = '';
            document.getElementById('smtpEmail').value = '';
            document.getElementById('smtpPassword').value = '';            document.getElementById('imageFile').value = '';
            document.getElementById('status').style.display = 'none';
            document.getElementById('result').style.display = 'none';
        }
        
        // 🔧 Fungsi utama upload
        async function upload() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            // 🔧 Ambil data dari form
            const data = {
                bloggerEmail: document.getElementById('bloggerEmail').value.trim(),
                smtpEmail: document.getElementById('smtpEmail').value.trim(),
                smtpPassword: document.getElementById('smtpPassword').value.trim(),
                image: document.getElementById('imageFile').files[0]
            };

            // 🔧 Validasi input
            if (!data.bloggerEmail || !data.smtpEmail || !data.smtpPassword || !data.image) {
                showAlert('❌ Sila isi semua field yang diperlukan!', 'error');
                return;
            }
            
            if (!data.image.type.startsWith('image/')) {
                showAlert('❌ Fail mestilah dalam format gambar (JPG/PNG/GIF)!', 'error');
                return;
            }
            
            if (data.image.size > 10 * 1024 * 1024) {
                showAlert('❌ Saiz gambar melebihi 10MB!', 'error');
                return;
            }

            // 🔧 Disable button & tunjuk status
            btn.disabled = true;
            btn.textContent = '⏳ Sedang memproses...';
            showAlert('📧 Menghantar gambar ke Blogger...', 'info');

            // 🔧 Siapkan FormData untuk POST
            const formData = new FormData();
            formData.append('bloggerEmail', data.bloggerEmail);
            formData.append('smtpEmail', data.smtpEmail);
            formData.append('smtpPassword', data.smtpPassword);
            formData.append('image', data.image);

            try {
                // 🔧 Hantar ke backend (upload.php)
                const res = await fetch('upload.php', {                     method: 'POST', 
                    body: formData 
                });
                
                const text = await res.text();
                
                // 🔧 Parse response JSON
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    throw new Error('Response server tidak valid: ' + text.substring(0, 150));
                }

                // 🔧 Handle success
                if (json.success) {
                    showAlert('✅ Upload berjaya!', 'success');
                    result.innerHTML = `
                        <strong>🔗 Link Gambar:</strong><br>
                        <a href="${json.image_url}" target="_blank">${json.image_url}</a>
                        <br>
                        <button onclick="navigator.clipboard.writeText('${json.image_url}')">
                            📋 Copy Link
                        </button>
                    `;
                    result.style.display = 'block';
                } 
                // 🔧 Handle error dari server
                else {
                    throw new Error(json.message || 'Unknown error');
                }
                
            } catch (e) {
                // 🔧 Handle network/error
                showAlert('❌ ' + e.message, 'error');
                console.error('Upload error:', e);
            } finally {
                // 🔧 Restore button
                btn.disabled = false;
                btn.textContent = '🚀 Upload Sekarang';
            }
        }
        
        // 🔧 Helper: Tunjuk status message
        function showAlert(msg, type) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = msg;
            status.style.display = 'block';
        }        
        // 🔧 Auto-clear password field selepas 30 saat (keselamatan)
        setTimeout(() => {
            const pwd = document.getElementById('smtpPassword');
            if (pwd.value) pwd.value = '';
        }, 30000);
    </script>
</body>
</html>
